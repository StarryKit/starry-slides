<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; }
      body { background: #fbf7ef; color: #1f2937; font-family: "Avenir Next", sans-serif; }
      .slide { width: 1920px; height: 1080px; padding: 108px; display: grid; gap: 40px; }
      h1, li { margin: 0; }
      h1 { font-size: 82px; line-height: 0.98; letter-spacing: -0.04em; max-width: 1280px; }
      ul { margin: 0; padding-left: 36px; display: grid; gap: 18px; max-width: 1180px; }
      li { font-size: 34px; line-height: 1.4; }
    </style>
  </head>
  <body>
    <main class="slide" data-slide-root="true" data-slide-width="1920" data-slide-height="1080" data-style-pack="starter-minimal" data-archetype="thesis">
      <h1 data-editable="text" data-role="title">Source-native decks are easier to trust</h1>
      <ul data-editable="block" data-role="supporting-points">
        <li data-editable="text">HTML stays readable in version control.</li>
        <li data-editable="text">Editors can preserve original structure instead of flattening it.</li>
        <li data-editable="text">Teams can review content and layout in the same artifact.</li>
      </ul>
    </main>
  </body>
</html>
