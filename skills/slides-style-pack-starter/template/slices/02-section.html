<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; }
      body { background: #1f2937; color: #f8fafc; font-family: "Avenir Next", sans-serif; }
      .slide { width: 1920px; height: 1080px; padding: 120px; display: grid; align-content: center; gap: 20px; }
      h1, p { margin: 0; }
      h1 { font-size: 118px; line-height: 0.94; letter-spacing: -0.05em; }
      p { font-size: 30px; line-height: 1.45; max-width: 860px; opacity: 0.82; }
    </style>
  </head>
  <body>
    <main class="slide" data-slide-root="true" data-slide-width="1920" data-slide-height="1080" data-style-pack="starter-minimal" data-archetype="section">
      <p data-editable="text" data-role="eyebrow">Section</p>
      <h1 data-editable="text" data-role="title">The shift</h1>
      <p data-editable="text" data-role="subtitle">From static documents to editable, inspectable HTML artifacts.</p>
    </main>
  </body>
</html>
