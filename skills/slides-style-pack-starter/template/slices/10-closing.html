<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; }
      body { background: #111827; color: #f9fafb; font-family: "Avenir Next", sans-serif; }
      .slide { width: 1920px; height: 1080px; padding: 120px; display: grid; align-content: center; gap: 28px; }
      h1, p { margin: 0; }
      h1 { font-size: 92px; line-height: 0.94; letter-spacing: -0.04em; max-width: 1320px; }
      p { font-size: 30px; line-height: 1.45; max-width: 1020px; opacity: 0.86; }
      .action { margin-top: 18px; font-size: 22px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.68; }
    </style>
  </head>
  <body>
    <main class="slide" data-slide-root="true" data-slide-width="1920" data-slide-height="1080" data-style-pack="starter-minimal" data-archetype="closing">
      <h1 data-editable="text" data-role="title">A good style pack makes the protocol feel invisible</h1>
      <p data-editable="text" data-role="body">Authors should feel like they are choosing a design language, while the system quietly preserves editability underneath it.</p>
      <div class="action" data-editable="text" data-role="action">Build style packs against the specimen deck, then map user content into those same archetypes.</div>
    </main>
  </body>
</html>
