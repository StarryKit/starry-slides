<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; }
      body { background: #172033; color: #f8fafc; font-family: "Avenir Next", sans-serif; }
      .slide { width: 1920px; height: 1080px; padding: 104px; display: grid; gap: 34px; }
      h1, li { margin: 0; }
      h1 { font-size: 82px; line-height: 0.98; letter-spacing: -0.04em; max-width: 1100px; }
      ul { margin: 0; padding-left: 28px; display: grid; gap: 18px; }
      li { font-size: 32px; line-height: 1.45; max-width: 1220px; }
    </style>
  </head>
  <body>
    <main class="slide" data-slide-root="true" data-slide-width="1920" data-slide-height="1080" data-style-pack="starter-minimal" data-archetype="list">
      <h1 data-editable="text" data-role="title">What teams need from deck tooling</h1>
      <ul data-editable="block" data-role="list">
        <li data-editable="text">Clear page boundaries</li>
        <li data-editable="text">Predictable editable markers</li>
        <li data-editable="text">Stable selectors for write-back</li>
        <li data-editable="text">A visual system that covers common page forms</li>
      </ul>
    </main>
  </body>
</html>
