<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; }
      body { background: #f5f1e8; color: #1f2937; font-family: "Avenir Next", sans-serif; }
      .slide { width: 1920px; height: 1080px; padding: 120px; display: grid; align-content: center; gap: 24px; }
      h1, p { margin: 0; }
      h1 { font-size: 112px; line-height: 0.92; letter-spacing: -0.04em; max-width: 1200px; }
      p { font-size: 34px; line-height: 1.4; max-width: 960px; }
      .meta { font-size: 20px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.6; }
    </style>
  </head>
  <body>
    <main class="slide" data-slide-root="true" data-slide-width="1920" data-slide-height="1080" data-style-pack="starter-minimal" data-archetype="title">
      <div class="meta" data-editable="text" data-role="meta">Protocol Specimen Deck</div>
      <h1 data-editable="text" data-role="title">Future of Team Workflows</h1>
      <p data-editable="text" data-role="subtitle">Why source-native collaboration changes how teams ship.</p>
    </main>
  </body>
</html>
