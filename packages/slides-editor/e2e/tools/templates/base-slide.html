<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: #201812;
        background: linear-gradient(135deg, #f8eedf 0%, #f1dfc2 100%);
      }

      .slide-container {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 120px;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <h1 data-editable="text">Slide title</h1>
      <p data-editable="text">Slide body</p>
    </div>
  </body>
</html>
