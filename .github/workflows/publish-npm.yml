name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: publish-npm-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      STARRY_SLIDES_DISABLE_UPDATE_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main --tags
          git checkout main
          git reset --hard origin/main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read package metadata
        id: pkg
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "head_subject=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      - name: Read npm metadata
        id: npm
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

          latest_version="$(npm view "${{ steps.pkg.outputs.name }}" dist-tags.latest 2>/dev/null || true)"
          echo "latest_version=$latest_version" >> "$GITHUB_OUTPUT"

      - name: Decide release action
        id: release
        run: |
          if [ "${{ steps.npm.outputs.published }}" != "true" ]; then
            echo "mode=publish" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.pkg.outputs.version }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ steps.pkg.outputs.head_subject }}" == chore\(release\):* ]]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.pkg.outputs.version }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_version="${{ steps.npm.outputs.latest_version }}"

          if [ -z "$base_version" ]; then
            base_version="${{ steps.pkg.outputs.version }}"
          fi

          next_version="$(node -e '
            const [major, minor, patch] = process.argv[1].split(".").map(Number);
            if ([major, minor, patch].some((part) => Number.isNaN(part))) {
              throw new Error(`Invalid semver: ${process.argv[1]}`);
            }
            process.stdout.write(`${major}.${minor}.${patch + 1}`);
          ' "$base_version")"

          echo "mode=release_pr" >> "$GITHUB_OUTPUT"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"

      - name: Prepare release PR version
        if: steps.release.outputs.mode == 'release_pr'
        run: |
          npm version "${{ steps.release.outputs.version }}" --no-git-tag-version
          pnpm install --lockfile-only

      - name: Build package
        if: steps.release.outputs.mode == 'publish'
        run: pnpm build

      - name: Validate publish package
        if: steps.release.outputs.mode == 'publish'
        run: npm pack --dry-run

      - name: Commit release version
        if: steps.release.outputs.mode == 'release_pr'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="release/v${{ steps.release.outputs.version }}"
          git checkout -b "$branch"
          git add package.json pnpm-lock.yaml
          git commit -m "chore(release): v${{ steps.release.outputs.version }}"
          git push origin "HEAD:$branch" --force
          # Close any existing PR for this branch
          existing_pr=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')
          if [ -n "$existing_pr" ]; then
            gh pr close "$existing_pr"
          fi
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(release): v${{ steps.release.outputs.version }}" \
            --body "Automated version bump to v${{ steps.release.outputs.version }}."

      - name: Publish package
        if: steps.release.outputs.mode == 'publish'
        run: npm publish --access public

      - name: Skip publish
        if: steps.release.outputs.mode == 'skip'
        run: echo "Skipping publish because main already points at a published release commit."
