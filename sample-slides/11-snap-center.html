<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: #172033;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 48%, #f8fafc 100%);
    }
    body {
      position: relative;
    }
    .slide-container {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 88px 96px;
      overflow: hidden;
    }
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1, h2, h3, p {
      margin: 0;
    }
    .muted {
      color: rgba(17, 24, 39, 0.68);
    }
    .surface {
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }
  
    .stage-label {
      position: absolute;
      left: 96px;
      top: 72px;
      display: grid;
      gap: 14px;
    }
    .stage-label .kicker {
      width: fit-content;
      background: rgba(127, 29, 29, 0.08);
      color: #8a3b12;
    }
    .stage-label h1 {
      max-width: 920px;
      font-size: 62px;
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .stage-label p {
      max-width: 720px;
      font-size: 24px;
      line-height: 1.45;
      color: rgba(23, 32, 51, 0.68);
    }
    .center-probe {
      position: absolute;
      left: 1260px;
      top: 520px;
      width: 260px;
      height: 180px;
      border-radius: 20px;
      padding: 24px;
      background: rgba(255, 247, 237, 0.92);
      border: 1px solid rgba(74, 85, 104, 0.16);
      box-shadow: 0 22px 46px rgba(30, 41, 59, 0.13);
    }
    .snap-drag-surface {
      position: absolute;
      right: 18px;
      bottom: 18px;
      width: 76px;
      height: 34px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(15, 23, 42, 0.1);
    }
    .center-probe strong {
      display: block;
      margin-bottom: 12px;
      font-size: 28px;
      color: #172033;
    }
    .center-probe span {
      display: block;
      font-size: 20px;
      line-height: 1.35;
      color: rgba(23, 32, 51, 0.66);
    }</style>
  </head>
  <body>
    <div class="slide-container" data-slide-root="true" data-slide-width="1920" data-slide-height="1080" data-editor-id="slide-root">
      
      <section class="stage-label">
        <div class="kicker">Snap center fixture</div>
        <h1>One isolated block for slide center snapping</h1>
        <p>This page keeps the slide center test clean: one editable block, no sibling targets, and a predictable drag surface.</p>
      </section>
      <article class="center-probe" data-editable="block" data-editor-id="snap-center-probe">
        <strong data-editable="text" data-editor-id="text-2">Center probe</strong>
        <span data-editable="text" data-editor-id="text-3">Use this block for slide center snaps.</span>
        <div class="snap-drag-surface"></div>
      </article>
    
    </div>
  
</body></html>
