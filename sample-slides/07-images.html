<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: #111827;
      background: linear-gradient(145deg, #f7f2ea 0%, #f4fbff 48%, #eff6ff 100%);
    }
    body {
      position: relative;
    }
    .slide-container {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 88px 96px;
      overflow: hidden;
    }
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1, h2, h3, p {
      margin: 0;
    }
    .muted {
      color: rgba(17, 24, 39, 0.68);
    }
    .surface {
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }
  
    .header {
      margin-bottom: 28px;
    }
    .header .kicker {
      background: rgba(124, 58, 237, 0.1);
      color: #6d28d9;
    }
    .header h1 {
      margin-top: 18px;
      max-width: 1140px;
      font-size: 74px;
      line-height: 1.02;
      letter-spacing: -0.03em;
    }
    .header p {
      margin-top: 18px;
      max-width: 960px;
      font-size: 24px;
      line-height: 1.5;
      color: rgba(31, 41, 55, 0.74);
    }
    .gallery {
      display: grid;
      grid-template-columns: 1.25fr 0.9fr;
      gap: 24px;
      height: 760px;
    }
    .hero-image,
    .stack-card {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.88);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
    }
    .hero-image img,
    .stack-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .caption {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 22px;
      padding: 18px 20px;
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.66);
      color: #f8fafc;
      backdrop-filter: blur(10px);
    }
    .caption strong {
      display: block;
      margin-bottom: 8px;
      font-size: 22px;
    }
    .caption span {
      font-size: 18px;
      line-height: 1.45;
      color: rgba(226, 232, 240, 0.86);
    }
    .stack {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 24px;
    }</style>
  </head>
  <body>
    <div class="slide-container" data-slide-root="true" data-slide-width="1920" data-slide-height="1080">
      
      <div class="header">
        <div class="kicker" data-editable="text">Images</div>
        <h1 data-editable="text">Image-heavy slides expose sizing, cropping, and selection behavior around data-editable image nodes</h1>
        <p data-editable="text">The images here are inline data URIs, so the generated deck remains self-contained and portable. That keeps the fixture stable for tests and demo environments.</p>
      </div>

          />
          <figcaption class="caption" data-editable="block">
            <strong data-editable="text">Product mockup</strong>
            <span data-editable="text">A synthetic image that represents the iframe editor, sidebar, and inspector working together.</span>
          </figcaption>
        </figure>
        <div class="stack">
          <figure class="stack-card" data-editable="block">
            <img
              data-editable="image"

              src="data:image/svg+xml;utf8,%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20760%20360'%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3Cdefs%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3ClinearGradient%20id%3D'g1'%20x1%3D'0'%20x2%3D'1'%20y1%3D'0'%20y2%3D'1'%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3Cstop%20offset%3D'0%25'%20stop-color%3D'%23f59e0b'%2F%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3Cstop%20offset%3D'100%25'%20stop-color%3D'%23ef4444'%2F%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3C%2FlinearGradient%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3C%2Fdefs%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3Crect%20width%3D'760'%20height%3D'360'%20rx%3D'36'%20fill%3D'%23fff7ed'%2F%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3Ccircle%20cx%3D'168'%20cy%3D'182'%20r%3D'92'%20fill%3D'url(%23g1)'%20opacity%3D'0.9'%2F%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3Crect%20x%3D'288'%20y%3D'88'%20width%3D'352'%20height%3D'56'%20rx%3D'28'%20fill%3D'%231f2937'%2F%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3Crect%20x%3D'288'%20y%3D'164'%20width%3D'268'%20height%3D'26'%20rx%3D'13'%20fill%3D'%2394a3b8'%2F%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3Crect%20x%3D'288'%20y%3D'208'%20width%3D'308'%20height%3D'26'%20rx%3D'13'%20fill%3D'%23cbd5e1'%2F%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3Crect%20x%3D'288'%20y%3D'252'%20width%3D'224'%20height%3D'26'%20rx%3D'13'%20fill%3D'%23e2e8f0'%2F%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%20%3C%2Fsvg%3E%0A%20%20%20%20%20%20%20%20%20%20%20%20%20%20"
            />
            <figcaption class="caption" data-editable="block">
              <strong data-editable="text">Workflow illustration</strong>

            </figcaption>
          </figure>
          <figure class="stack-card" data-editable="block">

            />
            <figcaption class="caption" data-editable="block">
